name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths: ['fxconsulting/**']
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: fxconsulting/package-lock.json
      - run: npm ci
        working-directory: fxconsulting
      - run: npm run build
        working-directory: fxconsulting
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: fxconsulting
          command: deploy
